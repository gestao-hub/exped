name: build-installer
on:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - '.github/workflows/build-installer.yml'
      - 'agent/**'
      - 'app/**'
      - 'components/**'
      - 'hub/**'
      - 'lib/**'
      - 'public/**'
      - 'scripts/local-stack/**'
      - 'scripts/montar-payload.mjs'
      - 'supabase/migrations/**'
      - 'next.config.*'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  installer:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24.18.0'
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - name: Validate Windows PowerShell 5.1 scripts
        shell: powershell
        run: |
          if ($PSVersionTable.PSVersion.Major -ne 5) {
            throw "Expected Windows PowerShell 5.1, got $($PSVersionTable.PSVersion)"
          }
          $failed = $false
          $scripts = @(
            Get-ChildItem hub -Filter *.ps1 -File
            Get-ChildItem hub/win -Filter *.ps1 -File
          )
          $scripts | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $failed = $true
              Write-Error "$($_.Name): $($errors.Message -join '; ')"
            }
          }
          if ($failed) { exit 1 }
      - name: Versao
        id: ver
        shell: bash
        run: echo "ver=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Build app (standalone)
        run: npm run build
        env:
          SUPABASE_URL: http://127.0.0.1:54320
          SUPABASE_ANON_KEY: build-placeholder-anon

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '8.0.423'
      - name: Test Agent readiness contract
        run: dotnet test agent/ExpedAgent.Tests/ExpedAgent.Tests.csproj --configuration Release
      - name: Publish agente (win-x64, self-contained)
        run: dotnet publish agent/ExpedAgent -c Release -o agent/installer/publish

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25.8'
      - name: Build GoTrue auth.exe
        shell: bash
        env:
          AUTH_COMMIT_1: 4fa66ba7
          AUTH_COMMIT_2: 1d8c55b5
          AUTH_COMMIT_3: c95cd563
          AUTH_COMMIT_4: 5766ed8b
          AUTH_COMMIT_5: bae6d96a
          AUTH_VERSION: v2.189.0
        run: |
          set -euo pipefail
          AUTH_COMMIT="${AUTH_COMMIT_1}${AUTH_COMMIT_2}${AUTH_COMMIT_3}${AUTH_COMMIT_4}${AUTH_COMMIT_5}"
          rm -rf /tmp/auth
          git init /tmp/auth
          cd /tmp/auth
          git remote add origin https://github.com/supabase/auth
          git fetch --depth 1 origin "$AUTH_COMMIT"
          git checkout --detach FETCH_HEAD
          test "$(git rev-parse HEAD)" = "$AUTH_COMMIT"
          git apply --ignore-whitespace "$GITHUB_WORKSPACE/hub/win/gotrue-windows.patch"
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags "-X github.com/supabase/auth/internal/utilities.Version=$AUTH_VERSION" -o auth.exe .
          mkdir -p "$GITHUB_WORKSPACE/gotrue-build"
          cp auth.exe "$GITHUB_WORKSPACE/gotrue-build/auth.exe"
          cp -r migrations "$GITHUB_WORKSPACE/gotrue-build/migrations"

      - name: Baixar e validar mkcert.exe (HTTPS na LAN)
        shell: pwsh
        run: |
          function Assert-Sha256($Path, $Expected) {
            $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $Path).Hash.ToLowerInvariant()
            if ($actual -ne $Expected) { throw "SHA-256 invalido para ${Path}: $actual" }
          }
          curl.exe -fL --retry 3 -o mkcert.exe https://github.com/FiloSottile/mkcert/releases/download/v1.4.4/mkcert-v1.4.4-windows-amd64.exe
          if ($LASTEXITCODE -ne 0) { throw "Falha ao baixar mkcert.exe" }
          Assert-Sha256 'mkcert.exe' 'd2660b50a9ed59eada480750561c96abc2ed4c9a38c6a24d93e30e0977631398'

      - name: Montar payload
        shell: bash
        env:
          VER: ${{ steps.ver.outputs.ver }}
        run: node scripts/montar-payload.mjs --auth gotrue-build/auth.exe --auth-migrations gotrue-build/migrations --mkcert mkcert.exe --version "$VER"

      - name: Smoke transactional snapshot with deep paths
        shell: pwsh
        run: |
          $root = Join-Path $env:RUNNER_TEMP "exped-snapshot-root-$PID"
          $transaction = 'C:\ExpedHubTxn-smoke-' + [Guid]::NewGuid().ToString('N')
          $serviceName = "ExpedHubSmoke$PID$([Guid]::NewGuid().ToString('N').Substring(0, 8))"
          $serviceCreated = $false
          $relativeDeepPath = 'bin\pgsql\pgAdmin 4\web\pgadmin\browser\server_groups\servers\databases\foreign_data_wrappers\foreign_servers\user_mappings\templates\user_mappings\sql'
          $deepPath = Join-Path $root $relativeDeepPath
          try {
            $createOutput = @(& sc.exe create $serviceName `
              binPath= "$env:SystemRoot\System32\cmd.exe /c exit 0" `
              start= demand 2>&1 | ForEach-Object { "$_" })
            if ($LASTEXITCODE -ne 0) {
              throw "Nao foi possivel criar o servico descartavel: $($createOutput -join ' ')"
            }
            $serviceCreated = $true
            $serviceKey = "HKLM\SYSTEM\CurrentControlSet\Services\$serviceName"
            $regOutput = @(& reg.exe add "$serviceKey\Parameters\AppExit" `
              /v Default /t REG_SZ /d Restart /f 2>&1 | ForEach-Object { "$_" })
            if ($LASTEXITCODE -ne 0) {
              throw "Nao foi possivel criar subchaves descartaveis: $($regOutput -join ' ')"
            }
            New-Item -ItemType Directory -Path $deepPath -Force | Out-Null
            $deepProbe = Join-Path $deepPath 'probe.sql'
            [IO.File]::WriteAllText($deepProbe, 'select 1;')
            & powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass `
              -File 'hub\win\installer-orchestrator.ps1' `
              -Operation SnapshotHub `
              -Root $root `
              -TransactionDir $transaction `
              -ServiceName $serviceName
            if ($LASTEXITCODE -ne 0) {
              throw "Snapshot transacional falhou com exit code $LASTEXITCODE."
            }
            $backupProbe = Join-Path $transaction ("payload\$relativeDeepPath\probe.sql")
            if (-not (Test-Path -LiteralPath $backupProbe -PathType Leaf)) {
              throw 'Snapshot nao preservou o path profundo de teste.'
            }
            if (-not (Test-Path -LiteralPath (Join-Path $transaction 'hub-state.json') -PathType Leaf)) {
              throw 'Snapshot nao gerou hub-state.json.'
            }
            $state = Get-Content -Raw -LiteralPath (Join-Path $transaction 'hub-state.json') |
              ConvertFrom-Json
            if (-not $state.ServiceExistedBefore -or $state.ServiceWasRunningBefore) {
              throw 'Snapshot nao registrou corretamente o servico descartavel parado.'
            }
            $aclPath = Join-Path $transaction 'service-acl.json'
            $aclState = Get-Content -Raw -LiteralPath $aclPath | ConvertFrom-Json
            if (@($aclState.Keys).Count -lt 3) {
              throw 'Snapshot nao capturou as ACLs da arvore do servico descartavel.'
            }

            [IO.File]::WriteAllText($deepProbe, 'mutated')
            $null = & reg.exe add "$serviceKey\Parameters\AppExit" `
              /v Default /t REG_SZ /d Ignore /f
            if ($LASTEXITCODE -ne 0) { throw 'Nao foi possivel preparar a mutacao de rollback.' }
            & powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass `
              -File 'hub\win\installer-orchestrator.ps1' `
              -Operation RestoreHub `
              -Root $root `
              -TransactionDir $transaction `
              -ServiceName $serviceName
            if ($LASTEXITCODE -ne 0) {
              throw "Rollback transacional falhou com exit code $LASTEXITCODE."
            }
            if ([IO.File]::ReadAllText($deepProbe) -ne 'select 1;') {
              throw 'Rollback nao restaurou o arquivo profundo original.'
            }
            $queryOutput = @(& reg.exe query "$serviceKey\Parameters\AppExit" `
              /v Default 2>&1 | ForEach-Object { "$_" })
            if ($LASTEXITCODE -ne 0 -or ($queryOutput -join "`n") -notmatch 'REG_SZ\s+Restart') {
              throw 'Rollback nao restaurou a arvore original do registro do servico.'
            }
            $restoredService = Get-Service -Name $serviceName -ErrorAction SilentlyContinue
            if (-not $restoredService -or $restoredService.Status -ne 'Stopped') {
              throw 'Rollback nao preservou o servico descartavel parado.'
            }
          } finally {
            if ($serviceCreated -or (Get-Service -Name $serviceName -ErrorAction SilentlyContinue)) {
              $null = & sc.exe delete $serviceName 2>&1
              $deadline = (Get-Date).AddSeconds(20)
              while ((Get-Service -Name $serviceName -ErrorAction SilentlyContinue) -and
                     (Get-Date) -lt $deadline) {
                Start-Sleep -Milliseconds 250
              }
            }
            Remove-Item -LiteralPath $root -Recurse -Force -ErrorAction SilentlyContinue
            Remove-Item -LiteralPath $transaction -Recurse -Force -ErrorAction SilentlyContinue
            if (Get-Service -Name $serviceName -ErrorAction SilentlyContinue) {
              throw "Servico descartavel continuou registrado: $serviceName"
            }
          }

      - name: Instalar Inno Setup 6.7.3 verificado
        shell: pwsh
        run: |
          function Assert-Sha256($Path, $Expected) {
            $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $Path).Hash.ToLowerInvariant()
            if ($actual -ne $Expected) { throw "SHA-256 invalido para ${Path}: $actual" }
          }
          curl.exe -fL --retry 3 -o innosetup.exe https://github.com/jrsoftware/issrc/releases/download/is-6_7_3/innosetup-6.7.3.exe
          if ($LASTEXITCODE -ne 0) { throw "Falha ao baixar Inno Setup" }
          Assert-Sha256 'innosetup.exe' '9c73c3bae7ed48d44112a0f48e66742c00090bdb5bef71d9d3c056c66e97b732'
          $process = Start-Process -FilePath .\innosetup.exe -ArgumentList '/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART', '/SP-' -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw "Instalador do Inno Setup terminou com codigo $($process.ExitCode)" }

      - name: Compile unified installer (ISCC)
        shell: cmd
        env:
          VER: ${{ steps.ver.outputs.ver }}
        run: '"C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=%VER% hub\win\exped-setup.iss'

      - name: Smoke unified installer initialization
        shell: pwsh
        run: |
          function Assert-SmokeHostClean([string]$Phase, [bool]$AllowRoot = $false) {
            $problems = @()
            if ((Test-Path 'C:\Exped') -and -not $AllowRoot) {
              $problems += 'C:\Exped existe'
            }
            if (Get-Service -Name 'ExpedHub' -ErrorAction SilentlyContinue) {
              $problems += 'servico ExpedHub existe'
            }
            $uninstallPaths = @(
              'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*',
              'HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*'
            )
            $uninstallEntries = @(
              Get-ItemProperty -Path $uninstallPaths -ErrorAction SilentlyContinue |
                Where-Object { $_.DisplayName -in @('Exped', 'Exped Hub') }
            )
            if ($uninstallEntries.Count -gt 0) { $problems += 'registro de uninstall existe' }
            $agentPaths = @(
              (Join-Path $env:LOCALAPPDATA 'ExpedAgent'),
              (Join-Path ([Environment]::GetFolderPath('Startup')) 'ExpedAgent.vbs')
            )
            if ($agentPaths | Where-Object { Test-Path -LiteralPath $_ }) {
              $problems += 'arquivos do ExpedAgent existem'
            }
            if (Get-Process -Name 'ExpedAgent' -ErrorAction SilentlyContinue) {
              $problems += 'processo ExpedAgent existe'
            }
            if (Get-ScheduledTask -TaskName 'ExpedAgent' -ErrorAction SilentlyContinue) {
              $problems += 'tarefa ExpedAgent existe'
            }
            if ($problems.Count -gt 0) {
              throw "Host alterado no smoke ($Phase): $($problems -join '; ')"
            }
          }

          function Invoke-InitSmoke([string]$ExpectedState) {
            $log = Join-Path $env:RUNNER_TEMP "exped-setup-init-$ExpectedState.log"
            Remove-Item -LiteralPath $log -Force -ErrorAction SilentlyContinue
            $arguments = @(
              '/VERYSILENT',
              '/SUPPRESSMSGBOXES',
              '/NORESTART',
              '/SP-',
              '/initsmoke=1',
              "/LOG=$log"
            )
            $process = Start-Process -FilePath 'hub\win\Output\ExpedSetup.exe' `
              -ArgumentList $arguments -Wait -PassThru
            $content = Get-Content -LiteralPath $log -Raw
            if ($content -match 'expand the "app" constant') {
              throw 'InitializeWizard tentou expandir {app} antes da inicializacao.'
            }
            $marker = "EXPED_INIT_SMOKE_OK:$ExpectedState"
            if ($content -notmatch [regex]::Escape($marker)) {
              Write-Host $content
              throw "O instalador nao confirmou o estado $ExpectedState."
            }
            $receiptPattern = [regex]::Escape($marker + ':') + 'exped-\d{14}-\d{1,9}(?![A-Za-z0-9_-])'
            if ($content -notmatch $receiptPattern) {
              Write-Host $content
              throw "O instalador nao gerou um receipt valido no estado $ExpectedState."
            }
            if ($process.ExitCode -eq 0) {
              throw 'O smoke deve encerrar intencionalmente dentro de InitializeWizard.'
            }
          }

          $baselineRoot = "C:\Exped-smoke-baseline-$PID-$([Guid]::NewGuid().ToString('N'))"
          $rootExisted = Test-Path -LiteralPath 'C:\Exped'
          $baselineMoved = $false
          Assert-SmokeHostClean 'antes' $rootExisted
          try {
            if ($rootExisted) {
              Move-Item -LiteralPath 'C:\Exped' -Destination $baselineRoot
              $baselineMoved = $true
            }
            Assert-SmokeHostClean 'isolado'
            Invoke-InitSmoke 'clean'
            New-Item -ItemType Directory -Path 'C:\Exped' -Force | Out-Null
            $config = @{
              cloud = @{
                apiBase = 'https://smoke.invalid'
                deviceToken = 'ci-smoke-token'
              }
            } | ConvertTo-Json -Depth 4
            [IO.File]::WriteAllText(
              'C:\Exped\config.json',
              $config,
              (New-Object Text.UTF8Encoding($false))
            )
            Invoke-InitSmoke 'provisioned'
          } finally {
            Remove-Item -LiteralPath 'C:\Exped' -Recurse -Force -ErrorAction SilentlyContinue
            if ($baselineMoved) {
              Move-Item -LiteralPath $baselineRoot -Destination 'C:\Exped'
            }
            Assert-SmokeHostClean 'depois' $rootExisted
          }

      - name: Compile hub-only installer (ISCC)
        shell: cmd
        env:
          VER: ${{ steps.ver.outputs.ver }}
        run: '"C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=%VER% hub\win\exped-hub.iss'

      - name: Smoke hub-only installer initialization
        shell: powershell
        run: |
          $log = Join-Path $env:RUNNER_TEMP 'exped-hub-init.log'
          Remove-Item -LiteralPath $log -Force -ErrorAction SilentlyContinue
          $arguments = @(
            '/VERYSILENT',
            '/SUPPRESSMSGBOXES',
            '/NORESTART',
            '/SP-',
            '/initsmoke=1',
            "/LOG=$log"
          )
          $process = Start-Process -FilePath 'hub\win\Output\ExpedHubSetup.exe' `
            -ArgumentList $arguments -Wait -PassThru
          $content = Get-Content -LiteralPath $log -Raw
          $receiptPattern = 'EXPED_HUB_INIT_SMOKE_OK:exped-\d{14}-\d{1,9}(?![A-Za-z0-9_-])'
          if ($content -notmatch $receiptPattern) {
            Write-Host $content
            throw 'O instalador Hub-only nao gerou um receipt valido.'
          }
          if ($process.ExitCode -eq 0) {
            throw 'O smoke Hub-only deve encerrar intencionalmente dentro de InitializeWizard.'
          }

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ExpedSetup-${{ steps.ver.outputs.ver }}
          path: |
            hub/win/Output/ExpedSetup.exe
            hub/win/Output/ExpedHubSetup.exe
          if-no-files-found: error
