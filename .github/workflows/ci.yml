name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  app:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test (vitest)
        run: npm test

      - name: Build
        env:
          # build precisa só das chaves públicas — não acessa o banco no build
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
        run: npm run build

  database:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v3.0.0
        with:
          version: 2.109.1

      - name: Install
        run: npm ci

      - name: Validate local Supabase schema
        run: scripts/test-supabase-local.sh

  windows:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24.18.0'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Test release contracts on Windows
        run: npx vitest run scripts/__tests__/release-hub.test.mjs scripts/__tests__/ci-workflow.test.mjs hub/test/windows-installer-transaction.test.mjs hub/test/updater.test.mjs

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '8.0.423'

      - name: Test Agent readiness contract
        run: dotnet test agent/ExpedAgent.Tests/ExpedAgent.Tests.csproj --configuration Release

      - name: Validate Windows PowerShell 5.1 scripts
        shell: powershell
        run: |
          if ($PSVersionTable.PSVersion.Major -ne 5) {
            throw "Expected Windows PowerShell 5.1, got $($PSVersionTable.PSVersion)"
          }
          $failed = $false
          $scripts = @(
            Get-ChildItem hub -Filter *.ps1 -File
            Get-ChildItem hub/win -Filter *.ps1 -File
            Get-ChildItem agent/installer -Filter *.ps1 -File
          )
          $scripts | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $failed = $true
              Write-Error "$($_.Name): $($errors.Message -join '; ')"
            }
          }
          if ($failed) { exit 1 }
